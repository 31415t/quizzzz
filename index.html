<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Culture Générale</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #quiz {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    #quiz:hover {
      transform: translateY(-5px);
    }

    h2 {
      text-align: center;
      color: #333;
      font-size: 2em;
      margin-bottom: 30px;
      position: relative;
    }

    h2:after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
    }

    .input-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 1.1em;
    }

    input {
      padding: 12px 15px;
      width: 100%;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input.error {
      border-color: #ff4444;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .question {
      background: #f8f9fa;
      margin-bottom: 25px;
      padding: 20px;
      border-radius: 15px;
      border-left: 4px solid #667eea;
      transition: all 0.3s ease;
    }

    .question:hover {
      background: #fff;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .question p {
      font-size: 1.1em;
      color: #333;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      margin: 0;
      padding: 12px 20px;
      background: white;
      color: #333;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 500;
      transition: all 0.3s ease;
      flex: 1 1 auto;
      min-width: 120px;
    }

    .btn:hover {
      background: #f0f0f0;
      border-color: #667eea;
    }

    .btn.selected {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      font-weight: 600;
      margin: 20px auto 0;
      display: block;
      width: 100%;
      max-width: 300px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      background: linear-gradient(135deg, #a0a0a0 0%, #808080 100%);
    }

    #result {
      margin-top: 30px;
      font-weight: 500;
      text-align: center;
      max-width: 700px;
      width: 100%;
    }

    .result-success {
      background: #d4edda;
      color: #155724;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #28a745;
      animation: slideIn 0.5s ease;
    }

    .result-error {
      background: #f8d7da;
      color: #721c24;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #dc3545;
      animation: slideIn 0.5s ease;
    }

    .result-loading {
      background: #e2f3ff;
      color: #004085;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #17a2b8;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.8);
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div id="quiz">
    <h2>🎯 Quiz Culture Générale</h2>

    <div class="input-group">
      <label for="nom">👤 Votre nom :</label>
      <input type="text" id="nom" placeholder="Entrez votre nom" autocomplete="off">
    </div>

    <div class="question">
      <p>📍 Question 1: Quelle est la capitale d'Haïti ?</p>
      <div class="button-group">
        <button class="btn" onclick="selectAnswer(0, 'Port-au-Prince')">Port-au-Prince</button>
        <button class="btn" onclick="selectAnswer(0, 'Cap-Haïtien')">Cap-Haïtien</button>
      </div>
    </div>

    <div class="question">
      <p>🌍 Question 2: Combien de continents existe-t-il ?</p>
      <div class="button-group">
        <button class="btn" onclick="selectAnswer(1, '5')">5 continents</button>
        <button class="btn" onclick="selectAnswer(1, '6')">6 continents</button>
        <button class="btn" onclick="selectAnswer(1, '7')">7 continents</button>
      </div>
    </div>

    <div class="question">
      <p>🎨 Question 3: Qui a peint la Joconde ?</p>
      <div class="button-group">
        <button class="btn" onclick="selectAnswer(2, 'Leonardo da Vinci')">Leonardo da Vinci</button>
        <button class="btn" onclick="selectAnswer(2, 'Michelangelo')">Michelangelo</button>
        <button class="btn" onclick="selectAnswer(2, 'Raphaël')">Raphaël</button>
      </div>
    </div>

    <button id="submitBtn" class="btn-submit" onclick="submitQuiz()">📤 Envoyer mes réponses</button>
  </div>

  <div id="result"></div>

  <div class="footer-note">
    ⚡ Les réponses seront enregistrées dans Google Sheets
  </div>

  <script>
    // État du quiz
    let answers = ["", "", ""];
    const correctAnswers = ["Port-au-Prince", "7", "Leonardo da Vinci"];
    
    // URL de votre Apps Script (À REMPLACER !)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykKNrqiYofr25jWUP6Yw3KUnBodjIXkXHtfdJKfFAwYwndXxEAmV7Bm8WypBXKLgiA/exec";

    // Initialisation
    document.addEventListener('DOMContentLoaded', function() {
      // Ajouter l'écouteur pour le champ nom
      const nomInput = document.getElementById("nom");
      if (nomInput) {
        nomInput.addEventListener('input', function() {
          this.classList.remove('error');
        });
      }
      
      // Vérifier la connexion au démarrage
      testConnection();
    });

    // Fonction pour sélectionner une réponse
    function selectAnswer(questionIndex, answer) {
      answers[questionIndex] = answer;
      console.log("✅ Réponse sélectionnée pour Q" + (questionIndex+1) + ":", answer);
      
      // Mise à jour visuelle des boutons
      updateButtonStyles(questionIndex, answer);
    }

    // Mettre à jour le style des boutons
    function updateButtonStyles(questionIndex, selectedAnswer) {
      const questionDiv = document.querySelectorAll('.question')[questionIndex];
      const buttons = questionDiv.querySelectorAll('.btn');
      
      buttons.forEach(btn => {
        const btnText = btn.innerText.split(' ')[0]; // Prendre le premier mot pour comparaison
        if (btn.innerText.includes(selectedAnswer) || btnText === selectedAnswer) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });
    }

    // Tester la connexion avec le serveur
    function testConnection() {
      console.log("🔍 Test de connexion au serveur...");
      
      fetch(APPS_SCRIPT_URL + "?test=1", {
        method: "GET",
        mode: "cors"
      })
      .then(res => res.json())
      .then(data => {
        console.log("✅ Serveur en ligne:", data);
        showMessage("info", "✅ Connecté au serveur");
      })
      .catch(err => {
        console.warn("⚠️ Serveur non joignable:", err);
        showMessage("warning", "⚠️ Mode hors ligne - Les réponses seront uniquement locales");
      });
    }

    // Fonction principale de soumission
    function submitQuiz() {
      // Validation des réponses
      if (answers.includes("")) {
        const unanswered = answers.reduce((acc, val, idx) => 
          val === "" ? acc.concat(idx + 1) : acc, []);
        showMessage("error", "❌ Veuillez répondre aux questions : " + 
          unanswered.map(q => q).join(", "));
        return;
      }

      // Validation du nom
      const nom = document.getElementById("nom").value.trim();
      if (!nom) {
        document.getElementById("nom").classList.add('error');
        showMessage("error", "❌ Veuillez entrer votre nom");
        document.getElementById("nom").focus();
        return;
      }

      // Calcul du score
      const score = answers.reduce((acc, answer, idx) => 
        acc + (answer === correctAnswers[idx] ? 1 : 0), 0);

      // Préparation des données
      const data = {
        nom: nom,
        score: score,
        reponses: answers,
        timestamp: new Date().toISOString()
      };

      console.log("📦 Données préparées:", data);

      // Désactiver le bouton et montrer le chargement
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      showMessage("loading", "⏳ Envoi en cours...");

      // Envoi vers Google Apps Script
      fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "cors",
        redirect: "follow",
        body: JSON.stringify(data),
        headers: {
          "Content-Type": "application/json"
        }
      })
      .then(res => {
        console.log("📡 Status réponse:", res.status);
        if (!res.ok) {
          throw new Error(`Erreur HTTP ${res.status}`);
        }
        return res.json();
      })
      .then(response => {
        console.log("✅ Réponse du serveur:", response);
        
        if (response.status === "success") {
          // Succès
          showMessage("success", 
            `🎉 Félicitations ${nom} !<br>` +
            `Votre score : ${score}/3<br>` +
            `Merci d'avoir participé !`
          );
          
          // Option : réinitialiser le quiz
          setTimeout(() => {
            if (confirm("Voulez-vous refaire le quiz ?")) {
              resetQuiz();
            }
          }, 2000);
        } else {
          throw new Error(response.message || "Erreur inconnue");
        }
      })
      .catch(err => {
        console.error("❌ Erreur:", err);
        
        // Mode dégradé - sauvegarde locale
        saveLocally(data);
        
        showMessage("error", 
          `❌ Erreur de connexion<br>` +
          `Vos résultats ont été sauvegardés localement.<br>` +
          `<small>${err.message}</small>`
        );
      })
      .finally(() => {
        // Réactiver le bouton
        setTimeout(() => {
          submitBtn.disabled = false;
        }, 3000);
      });
    }

    // Sauvegarde locale en cas d'échec
    function saveLocally(data) {
      const localResults = JSON.parse(localStorage.getItem('quiz_results') || '[]');
      localResults.push(data);
      localStorage.setItem('quiz_results', JSON.stringify(localResults));
      console.log("💾 Données sauvegardées localement");
    }

    // Afficher les messages
    function showMessage(type, content) {
      const resultDiv = document.getElementById("result");
      
      let className = "";
      let icon = "";
      
      switch(type) {
        case "success":
          className = "result-success";
          icon = "✅";
          break;
        case "error":
          className = "result-error";
          icon = "❌";
          break;
        case "loading":
          className = "result-loading";
          icon = "<span class='spinner'></span>";
          break;
        default:
          className = "result-loading";
          icon = "ℹ️";
      }
      
      resultDiv.innerHTML = `<div class="${className}">${icon} ${content}</div>`;
    }

    // Réinitialiser le quiz
    function resetQuiz() {
      answers = ["", "", ""];
      document.getElementById("nom").value = "";
      document.getElementById("nom").classList.remove('error');
      
      // Réinitialiser les styles des boutons
      document.querySelectorAll('.btn').forEach(btn => {
        btn.classList.remove('selected');
      });
      
      document.getElementById("result").innerHTML = "";
    }

    // Fonction pour voir les résultats locaux
    function viewLocalResults() {
      const localResults = JSON.parse(localStorage.getItem('quiz_results') || '[]');
      console.log("📊 Résultats locaux:", localResults);
      
      if (localResults.length === 0) {
        alert("Aucun résultat local");
      } else {
        alert(`${localResults.length} résultat(s) local(aux) trouvé(s). Voir console pour détails.`);
      }
    }

  </script>
</body>
</html>
